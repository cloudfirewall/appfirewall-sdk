name: Publish appfirewall-fastapi to PyPI

# Publishes the Python FastAPI SDK on a tagged GitHub Release whose tag starts
# with `python-fastapi-v` (e.g. `python-fastapi-v0.2.0`). Per-SDK tag prefixes
# keep release lines for different SDKs (Python/Java/Node) independent.
#
# Uses PyPI trusted publishing (OIDC) — no API token secret required.
# One-time setup on PyPI: https://pypi.org/manage/account/publishing/
#   Owner: sireto   Repo: appfirewall-sdk
#   Workflow: python-fastapi-publish.yml   Environment: pypi-fastapi

on:
  release:
    types: [published]
  workflow_dispatch:

defaults:
  run:
    working-directory: python/appfirewall-fastapi

jobs:
  verify:
    name: Run checks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'python-fastapi-v')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # hatch-vcs reads git tags to derive the version

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        run: pytest

      - name: mypy
        run: mypy src/

      - name: ruff
        run: ruff check src/ tests/

  build:
    name: Build distribution
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # hatch-vcs reads git tags to derive the version

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: python/appfirewall-fastapi/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on a real GitHub Release whose tag carries this SDK's
    # prefix. workflow_dispatch runs still build + verify (useful for
    # testing CI), but never reach PyPI.
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'python-fastapi-v')
    environment:
      name: pypi-fastapi
      url: https://pypi.org/p/appfirewall-fastapi
    permissions:
      id-token: write  # required for trusted publishing
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
